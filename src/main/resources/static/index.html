<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <style>
        :root {
            --primary: #0056b3;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #f4f4f9;
        }
        body { font-family: Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }

        /* Formulário */
        .form-group { margin-bottom: 10px; }
        input[type="text"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; font-size: 14px;}

        button { cursor: pointer; border: none; border-radius: 4px; padding: 10px; font-size: 14px; color: white; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-salvar { background: var(--primary); width: 100%; font-weight: bold; }
        .btn-editar { background: #6c757d; }
        .btn-status { background: var(--success); }
        .btn-excluir { background: var(--danger); }
        .btn-cancelar { background: #ccc; color: #333; width: 100%; margin-top: 5px; display: none; }

        /* Lista */
        .lista-tarefas { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .tarefa-item { border: 1px solid #ddd; padding: 15px; border-radius: 6px; display: flex; flex-direction: column; gap: 10px; }
        .tarefa-item.concluida { background: #f9fff9; border-color: var(--success); opacity: 0.8; }
        .tarefa-item.concluida h4 { text-decoration: line-through; color: #666; }
        .tarefa-info h4 { margin: 0 0 5px 0; }
        .tarefa-info p { margin: 0; font-size: 14px; color: #555; }
        .tarefa-info small { display: block; margin-top: 6px; font-size: 12px; color: #888; }
        .botoes { display: flex; gap: 5px; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gerenciador de Tarefas</h2>

    <input type="hidden" id="tarefaId">
    <div class="form-group">
        <input type="text" id="titulo" placeholder="Título da tarefa" required>
    </div>
    <div class="form-group">
        <input type="text" id="descricao" placeholder="Descrição" required>
    </div>
    <div class="checkbox-group">
        <input type="checkbox" id="concluido">
        <label for="concluido">Marcar como concluída</label>
    </div>

    <button class="btn-salvar" id="btnSalvar" onclick="salvarTarefa()">Salvar Tarefa</button>
    <button class="btn-cancelar" id="btnCancelar" onclick="limparFormulario()">Cancelar Edição</button>

    <div id="listaTarefas" class="lista-tarefas"></div>
</div>

<script>
    const API_URL = '/tarefa';

    async function carregarTarefas() {
        const res = await fetch(API_URL);
        const tarefas = await res.json();
        const divLista = document.getElementById('listaTarefas');
        divLista.innerHTML = '';

        tarefas.forEach(t => {
            // Formata a data (de YYYY-MM-DD para DD/MM/YYYY)
            const dataFormatada = t.data ? t.data.split('-').reverse().join('/') : 'Sem data';

            divLista.innerHTML += `
                <div class="tarefa-item ${t.concluido ? 'concluida' : ''}">
                    <div class="tarefa-info">
                        <h4>${t.titulo}</h4>
                        <p>${t.descricao}</p>
                        <small>Criado em: ${dataFormatada}</small>
                    </div>
                    <div class="botoes">
                        <button class="btn-status" onclick="alternarStatus(${t.id})">
                            ${t.concluido ? 'Reabrir' : 'Concluir'}
                        </button>
                        <button class="btn-editar" onclick="prepararEdicao(${t.id}, '${t.titulo}', '${t.descricao}', ${t.concluido})">
                            Editar
                        </button>
                        <button class="btn-excluir" onclick="deletarTarefa(${t.id})">
                            Excluir
                        </button>
                    </div>
                </div>
            `;
        });
    }

    async function salvarTarefa() {
        const id = document.getElementById('tarefaId').value;
        const titulo = document.getElementById('titulo').value;
        const descricao = document.getElementById('descricao').value;
        const concluido = document.getElementById('concluido').checked;

        if(!titulo || !descricao) return alert("Preencha título e descrição!");

        const payload = JSON.stringify({ titulo, descricao, concluido });
        const metodo = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/atualizar/${id}` : API_URL;

        await fetch(url, {
            method: metodo,
            headers: { 'Content-Type': 'application/json' },
            body: payload
        });

        limparFormulario();
        carregarTarefas();
    }

    function prepararEdicao(id, titulo, descricao, concluido) {
        document.getElementById('tarefaId').value = id;
        document.getElementById('titulo').value = titulo;
        document.getElementById('descricao').value = descricao;
        document.getElementById('concluido').checked = concluido;

        document.getElementById('btnSalvar').innerText = 'Atualizar Tarefa';
        document.getElementById('btnCancelar').style.display = 'block';
    }

    function limparFormulario() {
        document.getElementById('tarefaId').value = '';
        document.getElementById('titulo').value = '';
        document.getElementById('descricao').value = '';
        document.getElementById('concluido').checked = false;

        document.getElementById('btnSalvar').innerText = 'Salvar Tarefa';
        document.getElementById('btnCancelar').style.display = 'none';
    }

    async function alternarStatus(id) {
        await fetch(`${API_URL}/${id}`, { method: 'PUT' });
        carregarTarefas();
    }

    async function deletarTarefa(id) {
        if(confirm("Excluir esta tarefa?")) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            carregarTarefas();
        }
    }

    carregarTarefas();
</script>
</body>
</html>
